<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TT</title>
    <style>
        body {
            background-color: #F0FFFF; /* 天青色 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: "Microsoft YaHei", sans-serif;
            text-align: center;
        }
        .container {
            padding: 40px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,139,139,0.1);
        }
        h1 { color: #008B8B; font-size: 36px; margin-bottom: 10px; }
        p { color: #666; font-size: 18px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>天天吖 ✨</h1>
        <p>欢迎来到我的新空间</p>
        <p style="font-size: 14px; color: #999;">右下角的小助手正在苏醒...</p>
    </div>

    <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.19/libs/cn/index.js"></script>
    <script>
      new CozeWebSDK.WebChatClient({
        config: {
          bot_id: '7619333268731232271', 
        },
        componentProps: {
          title: '天天专属小助手',
        },
        auth: {
          type: 'token',
          // 记得换成你那串 pat_ 开头的长长代码！
          token: 'pat_这里填入你的新Token',
          onRefreshToken: function () {
            return 'pat_这里填入你的新Token'
          }
        }
      });
    </script>
</body>
</html>
